<!DOCTYPE html>

<body class="bg-surface text-on-surface font-body-md min-h-screen flex items-center justify-center p-md sm:p-gutter">
<!-- Login Container -->
<main class="w-full max-w-[480px]">
<!-- Brand Header -->
<div class="flex flex-col items-center mb-xl text-center">
<div class="w-24 h-24 mb-md">
<img alt="AssessCore Logo" class="w-full h-full object-contain" src="https://lh3.googleusercontent.com/aida/AP1WRLtaxBApts24hqg3biGKCz82N2NzkDZwMxdktvJyEa6pGL6j1B03PQeaABFt504i7MtjtSwitjHOx9zmZCnaClZ4Npnnbf-5SX4RPZdcvYSNw9waD9Ab_0lFGlH2HF7JAtNszFFfVRJ8dm_UQ-uTmYDBi_Gx-5-Mv_Pvh4E3Y4dxTrqQZAdG6Rauz1S1lToimLZRxyb1JDpIpbDTnhgsgaVApBRxgWLP0XNydr3maUvyScjaSN_S8Yg2i0iK"/>
</div>
<h1 class="font-headline-lg text-headline-lg text-primary">AssessCore</h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-sm">Enterprise Assessment Platform</p>
</div>
<!-- Login Card -->
<div class="bg-surface-container-lowest rounded-lg shadow-[0_4px_20px_rgba(0,0,0,0.05)] border border-outline-variant/30 overflow-hidden">
<div class="p-lg sm:p-xl">
<h2 class="font-title-lg text-title-lg text-on-surface mb-lg">Sign In</h2>
<form class="space-y-lg">
<!-- Email Input -->
<div class="space-y-sm">
<label class="font-label-md text-label-md text-on-surface block" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-on-surface-variant/60 pointer-events-none">mail</span>
<input class="w-full bg-surface-container-low border border-outline-variant rounded-md py-sm pl-10 pr-md font-body-md text-body-md text-on-surface focus:outline-none focus:border-secondary focus:ring-1 focus:ring-secondary transition-colors" id="email" name="email" placeholder="name@company.com" required="" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-sm">
<div class="flex justify-between items-center">
<label class="font-label-md text-label-md text-on-surface block" for="password">Password</label>
<a class="font-body-sm text-body-sm text-secondary hover:text-secondary-container transition-colors" href="#">Forgot password?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-on-surface-variant/60 pointer-events-none">lock</span>
<input class="w-full bg-surface-container-low border border-outline-variant rounded-md py-sm pl-10 pr-md font-body-md text-body-md text-on-surface focus:outline-none focus:border-secondary focus:ring-1 focus:ring-secondary transition-colors" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Submit Button -->
<button class="w-full bg-secondary text-on-secondary rounded-lg py-sm px-lg font-title-lg text-title-lg hover:bg-on-secondary-container transition-colors active:scale-[0.98] mt-xl" type="submit">
                        Daxil Ol
                    </button>
</form>
<!-- Divider -->
<div class="relative flex items-center py-lg mt-md">
<div class="flex-grow border-t border-outline-variant"></div>
<span class="flex-shrink-0 mx-4 font-body-sm text-body-sm text-on-surface-variant">or continue with</span>
<div class="flex-grow border-t border-outline-variant"></div>
</div>
<!-- SSO Login -->
<button class="w-full flex items-center justify-center gap-sm bg-transparent border border-outline-variant text-on-surface rounded-lg py-sm px-lg font-body-md text-body-md hover:bg-surface-container-low transition-colors" type="button">
<span class="material-symbols-outlined text-primary">corporate_fare</span>
                    Single Sign-On (SSO)
                </button>
</div>
<!-- Card Footer -->
<div class="bg-surface-container-low border-t border-outline-variant/30 p-md text-center">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                    Need an account? <a class="text-secondary hover:underline font-semibold" href="#">Contact Administrator</a>
</p>
</div>
</div>
<!-- Footer Links -->
<div class="mt-xl flex justify-center gap-md font-body-sm text-body-sm text-on-surface-variant/70">
<a class="hover:text-on-surface transition-colors" href="#">Privacy Policy</a>
<span>•</span>
<a class="hover:text-on-surface transition-colors" href="#">Terms of Service</a>
<span>•</span>
<a class="hover:text-on-surface transition-colors" href="#">Help Center</a>
</div>
</main>
</body></html>
